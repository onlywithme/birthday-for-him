<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>for u 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:linear-gradient(135deg,#e0f2fe,#bae6fd,#93c5fd);
  color:#0f172a;
}

.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:650px;
  background:rgba(255,255,255,0.85);
  padding:30px;
  border-radius:25px;
  text-align:center;
  backdrop-filter:blur(12px);
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.hidden{display:none;}

h1{margin-bottom:10px;}

.small{
  font-size:13px;
  color:#334155;
  margin-bottom:15px;
}

/* PIN */
.pin-dots{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  border:2px solid #2563eb;
}

.dot.filled{
  background:#2563eb;
}

.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}

.keypad button{
  padding:16px;
  border:none;
  border-radius:12px;
  background:#60a5fa;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* BUTTON */
.btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.back-btn{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#94a3b8;
  color:white;
  cursor:pointer;
  font-size:13px;
}

.button-group{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

/* MEMORY */
.memory{
  margin:12px 0;
}

img{
  width:100%;
  border-radius:15px;
}

/* GRID MEMORIES */
.memory-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  margin-top:15px;
}

.memory img,
.memory video{
  width:100%;
  border-radius:15px;
  display:block;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="Stephen Sanchez - Until I Found You (Off.mp3" type="audio/mpeg">
</audio>

<!-- PIN -->
<div class="container" id="login">
<div class="card">

<h1>Masukin PIN dulu 😏</h1>
<div class="small">your birthday 💙</div>

<div class="pin-dots">
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
</div>

<div class="keypad">
<button onclick="tap(1)">1</button>
<button onclick="tap(2)">2</button>
<button onclick="tap(3)">3</button>
<button onclick="tap(4)">4</button>
<button onclick="tap(5)">5</button>
<button onclick="tap(6)">6</button>
<button onclick="tap(7)">7</button>
<button onclick="tap(8)">8</button>
<button onclick="tap(9)">9</button>
<button onclick="clearPin()">⌫</button>
<button onclick="tap(0)">0</button>
<button onclick="check()">✔</button>
</div>

</div>
</div>

<!-- BIRTHDAY -->
<div class="container hidden" id="birthday">
<div class="card">

<h1>HAPPY BIRTHDAY SAYANG 💙</h1>

<img src="cat.jpeg" alt="cat birthday"
style="
width:100%;
max-width:320px;
aspect-ratio:4/3;
object-fit:cover;
margin:10px auto;
display:block;
border-radius:15px;
">

<p>Kamu nyebelin 😤 tapi aku tetap suka.</p>
<p>Kamu itu kayak WiFi… kalau hilang aku panik 😭</p>
<p>ulang tahun tapi aku yang baper sendiri 😌💙</p>

<div class="button-group">
<button class="btn" onclick="next()">NEXT</button>
</div>

</div>
</div>

<!-- WORDS -->
<div class="container hidden" id="words">
<div class="card">

<h1>for u 💙</h1>

<p id="text1" style="text-align:left; line-height:1.7;"></p>

<p id="text2" style="text-align:left; line-height:1.7;"></p>

<p id="text3" style="text-align:left; line-height:1.7;"></p>

<div class="button-group" id="wordButtons" style="display:none;">
<button class="btn" onclick="memories()">NEXT</button>
<button class="back-btn" onclick="backToBirthday()">BACK</button>
</div>

</div>
</div>

<!-- MEMORIES -->
<div class="container hidden" id="mem">
<div class="card">

<h1>I LOVE YOU 💙</h1>

<div class="memory-grid">

<div class="memory">
<img src="motor.jpeg">
</div>

<div class="memory">
<img src="fun.jpeg">
</div>

<div class="memory">
<img src="sekolah.jpeg">
</div>

<div class="memory">
<video autoplay loop muted playsinline>
  <source src="kiss.mp4" type="video/mp4">
</video>
</div>

<div class="memory">
<img src="vc1.jpeg">
</div>

<div class="memory">
<video autoplay loop muted playsinline>
  <source src="goyang.mp4" type="video/mp4">
</video>
</div>

</div>

<div class="button-group">
<button class="back-btn" onclick="backToWords()">BACK</button>
</div>

</div>
</div>

<script>

let pin = "";
const correct = "1405";

/* DOT UPDATE */
function update(){
  for(let i=1;i<=4;i++){
    document.getElementById("d"+i).classList.remove("filled");
  }
  for(let i=0;i<pin.length;i++){
    document.getElementById("d"+(i+1)).classList.add("filled");
  }
}

function tap(n){
  if(pin.length < 4){
    pin += n;
    update();
  }
}

function clearPin(){
  pin = pin.slice(0, -1);
  update();
}

/* MUSIC */
function playMusic(){
  const music = document.getElementById("bgMusic");
  music.volume = 0.4;
  music.play().catch(()=>{});
}

/* CHECK PIN */
function check(){
  if(pin === correct){
    playMusic();
    document.getElementById("login").classList.add("hidden");
    document.getElementById("birthday").classList.remove("hidden");
  } else {
    alert("TETOT. masa ngga tau ultah sendiri");
    clearPin();
  }
}

/* TYPING EFFECT */
let typed = false;

function typeWriter(element, text, speed, callback){
  let i = 0;

  function typing(){
    if(i < text.length){
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else if(callback){
      callback();
    }
  }

  typing();
}

function startTyping(){

  if(typed) return;
  typed = true;

  const t1 = "Aku nggak tau sejak kapan kamu jadi penting.<br>Tapi sekarang kamu susah diganti 😤";

  const t2 = "Kamu ngeselin tapi aku nyaman 😭";

  const t3 = "Kalau kamu stay… aku makin sayang.<br>Kalau kamu pergi… aku pura-pura biasa aja (padahal nggak 😤💙)";

  typeWriter(document.getElementById("text1"), t1, 35, () => {

    setTimeout(() => {

      typeWriter(document.getElementById("text2"), t2, 35, () => {

        setTimeout(() => {

          typeWriter(document.getElementById("text3"), t3, 35, () => {

            document.getElementById("wordButtons").style.display = "flex";

          });

        }, 500);

      });

    }, 500);

  });
}

/* NAVIGATION */
function next(){
  document.getElementById("birthday").classList.add("hidden");
  document.getElementById("words").classList.remove("hidden");

  startTyping();
}

function memories(){
  document.getElementById("words").classList.add("hidden");
  document.getElementById("mem").classList.remove("hidden");
}

function backToBirthday(){
  document.getElementById("words").classList.add("hidden");
  document.getElementById("birthday").classList.remove("hidden");
}

function backToWords(){
  document.getElementById("mem").classList.add("hidden");
  document.getElementById("words").classList.remove("hidden");
}

</script>

</body>
</html>
