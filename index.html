<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins;
}

body{
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#3b82f6);
  color:white;
}

.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:650px;
  background:rgba(255,255,255,0.08);
  padding:35px;
  border-radius:24px;
  text-align:center;
  backdrop-filter:blur(15px);
}

.hidden{display:none;}

h1{margin-bottom:15px;}

.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}

.keypad button{
  padding:18px;
  border:none;
  border-radius:12px;
  background:#60a5fa;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.keypad button:hover{
  background:#3b82f6;
}

.pin-dots{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  border:2px solid white;
}

.dot.filled{
  background:white;
}

.memory{
  background:rgba(255,255,255,0.1);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  text-align:left;
}

img{
  width:100%;
  border-radius:15px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginPage">
<div class="card">

<h1>Masukkan PIN 💙</h1>

<div class="pin-dots">
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
</div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearPin()">⌫</button>
<button onclick="press(0)">0</button>
<button onclick="checkPin()">✔</button>
</div>

</div>
</div>

<!-- BIRTHDAY -->
<div class="container hidden" id="birthday">
<div class="card">

<h1>Happy Birthday 💙</h1>

<p>Selamat ulang tahun yaa 💙</p>

<button onclick="showMemories()">Our Memories →</button>

</div>
</div>

<!-- MEMORIES -->
<div class="container hidden" id="memories">
<div class="card">

<h1>Our Memories 📸</h1>

<div class="memory">
<b>First Chat 💬</b><br>
<!-- isi tanggal -->
12 April 2024
</div>

<div class="memory">
<b>First Call 📞</b><br>
<!-- isi tanggal -->
18 April 2024
</div>

<div class="memory">
<b>First Meet 🤍</b><br>
<!-- isi tanggal -->
02 Mei 2024
</div>

<div class="memory">
<b>Us 💙</b>
<img src="foto.jpg" alt="us">
</div>

</div>
</div>

<script>

let pin = "";
const correctPin = "1905";

function updateDots(){
  for(let i=1;i<=4;i++){
    document.getElementById("d"+i).classList.remove("filled");
  }
  for(let i=0;i<pin.length;i++){
    document.getElementById("d"+(i+1)).classList.add("filled");
  }
}

function press(num){
  if(pin.length < 4){
    pin += num;
    updateDots();
  }
}

function clearPin(){
  pin = "";
  updateDots();
}

function checkPin(){
  if(pin === correctPin){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("birthday").classList.remove("hidden");
  } else {
    alert("PIN salah");
    clearPin();
  }
}

function showMemories(){
  document.getElementById("birthday").classList.add("hidden");
  document.getElementById("memories").classList.remove("hidden");
}

</script>

</body>
</html>
